name: 自动同步源仓库KHwang9883/MobileModels
# 触发条件：源仓库upstream主分支有push更新；每小时定时同步（双重保障）
on:
  repository_dispatch:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: # 手动触发同步按钮

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 拉取你自己的Fork仓库
          repository: xxz13352/MobileModels
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置Git用户
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 关联并拉取源仓库最新代码
        run: |
          git remote add upstream https://github.com/KHwang9883/MobileModels.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories

      - name: 推送到自己的Fork仓库
        run: |
          git push origin main
